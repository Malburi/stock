const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── VAPID urlBase64 변환 ───────────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

// ── 아이콘 ────────────────────────────────────────────────────────

);

// ── 알림 설정 팝업 (바텀시트) ──────────────────────────────────────
function AlertModal({ stock, draft, setDraft, onSave, onClear, onClose, pushStatus }) {
  if (!stock) return null;
  const hasAlert = draft.target || draft.stopLoss || draft.bigMove;
  return (
    <div style={{ position:'fixed', inset:0, zIndex:50, display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
      {/* 딤 배경 */}
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.45)' }}/>
      {/* 시트 */}
      <div style={{ position:'relative', background:'#fff', borderTop:'3px solid #1c1917', padding:'0 0 env(safe-area-inset-bottom,16px)' }}>
        {/* 핸들 */}
        <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 4px' }}>
          <div style={{ width:36, height:4, borderRadius:2, background:'#d6d3d1' }}/>
        </div>
        {/* 헤더 */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'4px 20px 12px', borderBottom:'2px solid #1c1917' }}>
          <div>
            <div style={{ fontWeight:900, fontSize:15 }}>{stock.n}</div>
            <div style={{ fontFamily:'monospace', fontSize:11, color:'#78716c', marginTop:2 }}>{stock.c} 알림 설정</div>
          </div>
          <button onClick={onClose} style={{ padding:8, background:'none', border:'none', cursor:'pointer' }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        {/* 폼 */}
        <div style={{ padding:'16px 20px', display:'flex', flexDirection:'column', gap:14 }}>
          {[['목표가', 'target', '#dc2626'], ['손절가', 'stopLoss', '#2563eb']].map(([label, key, color]) => (
            <div key={key} style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontFamily:'monospace', fontSize:12, color:'#78716c', width:48, flexShrink:0, fontWeight:700, color }}>{label}</span>
              <input
                type="number" placeholder="미설정"
                value={draft[key]}
                onChange={e => setDraft(d => ({ ...d, [key]: e.target.value }))}
                style={{ flex:1, border:'2px solid #e7e5e4', padding:'8px 10px', fontFamily:'monospace', fontSize:14, outline:'none', minWidth:0 }}
                onFocus={e => e.target.style.borderColor='#1c1917'}
                onBlur={e => e.target.style.borderColor='#e7e5e4'}
              />
              <span style={{ fontFamily:'monospace', fontSize:12, color:'#a8a29e' }}>원</span>
            </div>
          ))}
          {/* 토글 */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:2 }}>
            <span style={{ fontFamily:'monospace', fontSize:12, color:'#57534e' }}>급등락 경보 (±5%)</span>
            <button
              onClick={() => setDraft(d => ({ ...d, bigMove: !d.bigMove }))}
              style={{ position:'relative', width:48, height:26, borderRadius:13, background: draft.bigMove ? '#1c1917' : '#d6d3d1', border:'none', cursor:'pointer', transition:'background 0.2s', flexShrink:0 }}
            >
              <span style={{ position:'absolute', top:5, left: draft.bigMove ? 27 : 5, width:16, height:16, borderRadius:8, background:'white', transition:'left 0.2s' }}/>
            </button>
          </div>
          {/* 버튼 */}
          <div style={{ display:'flex', gap:8, paddingTop:4 }}>
            <button onClick={onSave}
                    style={{ flex:1, padding:'11px 0', fontWeight:900, fontSize:13, background:'#1c1917', color:'#fff', border:'none', cursor:'pointer' }}>
              저장
            </button>
            {hasAlert && (
              <button onClick={onClear}
                      style={{ padding:'11px 16px', fontWeight:700, fontSize:13, background:'none', border:'2px solid #d6d3d1', color:'#78716c', cursor:'pointer' }}>
                해제
              </button>
            )}
          </div>
          {pushStatus === 'ok'    && <div style={{ fontFamily:'monospace', fontSize:11, color:'#78716c', textAlign:'center' }}>✓ 알림 등록 완료</div>}
          {pushStatus === 'error' && <div style={{ fontFamily:'monospace', fontSize:11, color:'#dc2626', textAlign:'center' }}>알림 등록 실패 — 브라우저 알림 권한을 확인하세요</div>}
        </div>
      </div>
    </div>
  );
}

// ── SVG 차트 ──────────────────────────────────────────────────────
function PriceChart({ data }) {
  const [hover, setHover] = useState(null);
  if (!data || data.length < 2) return null;

  const W = 600, H = 200, PL = 58, PR = 12, PT = 12, PB = 28;
  const IW = W - PL - PR, IH = H - PT - PB;
  const prices = data.map(d => d.close);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const range = maxP - minP || 1;
  const toX = i => PL + (i / (data.length - 1)) * IW;
  const toY = v => PT + ((maxP - v) / range) * IH;
  const pts = data.map((d, i) => `${toX(i).toFixed(1)},${toY(d.close).toFixed(1)}`).join(' ');
  const yTicks = [minP, (minP + maxP) / 2, maxP];
  const step = Math.max(1, Math.floor((data.length - 1) / 4));
  const xIdxs = [...new Set([0, step, step*2, step*3, data.length - 1])];

  return (
    <div style={{ position: 'relative' }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
        {yTicks.map((v, i) => (
          <g key={i}>
            <line x1={PL} y1={toY(v)} x2={W-PR} y2={toY(v)} stroke="#e7e5e4" strokeDasharray="4,3"/>
            <text x={PL-4} y={toY(v)+4} textAnchor="end" fontSize="9" fill="#78716c" fontFamily="monospace">
              {fp(v)}
            </text>
          </g>
        ))}
        {xIdxs.map(i => (
          <text key={i} x={toX(i)} y={H-6} textAnchor="middle" fontSize="9" fill="#78716c" fontFamily="monospace">
            {data[i].date.slice(5)}
          </text>
        ))}
        {/* 종가 선 */}
        <polyline points={pts} fill="none" stroke="#1c1917" strokeWidth="2.5" strokeLinejoin="round"/>
        {data.map((d, i) => (
          <rect key={i} x={toX(i)-10} y={PT} width={20} height={IH} fill="transparent"
                onMouseEnter={() => setHover({ ...d, xi: i })}
                onMouseLeave={() => setHover(null)}/>
        ))}
        {hover && <>
          <line x1={toX(hover.xi)} y1={PT} x2={toX(hover.xi)} y2={PT+IH}
                stroke="#dc2626" strokeWidth="1" strokeDasharray="3,3" opacity="0.6"/>
          <circle cx={toX(hover.xi)} cy={toY(hover.close)} r="5" fill="#dc2626"/>
        </>}
      </svg>
      {hover && (
        <div style={{
          position:'absolute', top:'6px', left:'50%', transform:'translateX(-50%)',
          background:'#1c1917', color:'#fff', padding:'3px 10px',
          fontSize:'11px', fontFamily:'monospace', pointerEvents:'none', whiteSpace:'nowrap'
        }}>
          {hover.date}　₩{fp(hover.close)}
        </div>
      )}
    </div>
  );
}

// ── 상수 / 유틸 ───────────────────────────────────────────────────
const STORAGE_KEY  = 'stocks:watchlist:v3';
const ALERTS_KEY   = 'stocks:alerts:v1';
const PERIODS = [
  { key: '1M', label: '1개월' },
  { key: '3M', label: '3개월' },
  { key: '6M', label: '6개월' },
  { key: '1Y', label: '1년' },
];

const fp = v => (v == null || isNaN(v)) ? '-' : new Intl.NumberFormat('ko-KR').format(Math.round(v));
const fChange = (change, pct) => {
  if (change == null) return '';
  const s = change > 0 ? '+' : '';
  return `${s}${fp(change)} (${s}${Number(pct).toFixed(2)}%)`;
};
const cc = v => v > 0 ? 'text-red-500' : v < 0 ? 'text-blue-500' : 'text-stone-400';

const ls = {
  get:  key    => { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } },
  set: (key, v)=> { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} },
};

// ── API ───────────────────────────────────────────────────────────
const apiSearch = async (q) => {
  const res = await fetch(`/api/stocks/search?q=${encodeURIComponent(q)}`);
  if (!res.ok) throw new Error('검색 실패');
  return res.json();
};

const apiPrices = async (code, period) => {
  const res = await fetch(`/api/prices/${code}?period=${period}`);
  if (!res.ok) {
    let msg = `서버 오류 (${res.status})`;
    try { const j = await res.json(); if (j.detail) msg = j.detail; } catch {}
    throw new Error(msg);
  }
  const data = await res.json();
  if (!data.prices?.length) throw new Error('종가 데이터가 없습니다');
  return data;
};

// ══════════════════════════════════════════════════════════════════
function StockTracker() {
  const [watchlist,    setWatchlist]    = useState([]);
  const [ready,        setReady]        = useState(false);
  const [screen,       setScreen]       = useState('list');   // list | search | detail
  // 검색
  const [query,        setQuery]        = useState('');
  const [searchResults,setSearchResults]= useState([]);
  const [searchLoading,setSearchLoading]= useState(false);
  // 상세
  const [selected,     setSelected]     = useState(null);
  const [period,       setPeriod]       = useState('1M');
  const [priceData,    setPriceData]    = useState(null);
  const [priceSource,  setPriceSource]  = useState('');
  const [fetchedAt,    setFetchedAt]    = useState(null);
  const [priceLoading, setPriceLoading] = useState(false);
  const [priceError,   setPriceError]   = useState('');
  const [currentPrices, setCurrentPrices] = useState({});
  const [news,         setNews]         = useState([]);
  const [newsLoading,  setNewsLoading]  = useState(false);
  const [marketIndex,  setMarketIndex]  = useState(null);
  const [fundamentals, setFundamentals] = useState(null);
  const [investor,     setInvestor]     = useState(null);
  const [alerts,       setAlerts]       = useState(() => ls.get(ALERTS_KEY) || {});
  const [alertModal,   setAlertModal]   = useState({ open: false, stock: null });
  const [alertDraft,   setAlertDraft]   = useState({ target: '', stopLoss: '', bigMove: false });
  const [pushStatus,   setPushStatus]   = useState('idle'); // idle|requesting|ok|error
  const searchRef = useRef(null);
  const refreshTimer = useRef(null);
  const indexTimer = useRef(null);
  const swRegRef = useRef(null);

  // 초기 로드
  useEffect(() => {
    const saved = ls.get(STORAGE_KEY);
    if (Array.isArray(saved)) setWatchlist(saved);
    setReady(true);
  }, []);

  // 현재가 일괄 조회
  const loadCurrentPrices = useCallback(async (list) => {
    if (!list.length) return;
    // 로딩 상태 세팅
    setCurrentPrices(prev => {
      const next = { ...prev };
      list.forEach(s => { next[s.c] = { ...next[s.c], loading: true }; });
      return next;
    });
    await Promise.all(list.map(async s => {
      try {
        const res = await fetch(`/api/current/${s.c}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        setCurrentPrices(prev => ({ ...prev, [s.c]: { ...data, loading: false } }));
      } catch {
        setCurrentPrices(prev => ({ ...prev, [s.c]: { ...prev[s.c], loading: false } }));
      }
    }));
  }, []);

  // ── Push 구독 등록 ──────────────────────────────────────────────
  const registerPush = useCallback(async (currentAlerts) => {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      let reg = swRegRef.current;
      if (!reg) {
        reg = await navigator.serviceWorker.register('/sw.js');
        swRegRef.current = reg;
      }
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;
      setPushStatus('requesting');
      const keyRes = await fetch('/api/push/key');
      if (!keyRes.ok) return;
      const { publicKey } = await keyRes.json();
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey),
      });
      await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: sub.toJSON(), alerts: currentAlerts }),
      });
      setPushStatus('ok');
    } catch (e) {
      setPushStatus('error');
    }
  }, []);

  // 앱 시작 시 SW 등록 (알림 설정이 있으면 자동 구독)
  useEffect(() => {
    const saved = ls.get(ALERTS_KEY) || {};
    const hasAny = Object.values(saved).some(r => r.target || r.stopLoss || r.bigMove);
    if (hasAny) registerPush(saved);
  }, []);

  // 시장 지수 조회 (앱 시작 시 + 5분마다)
  const loadMarketIndex = useCallback(async () => {
    try {
      const res = await fetch('/api/index');
      if (res.ok) setMarketIndex(await res.json());
    } catch {}
  }, []);

  useEffect(() => {
    loadMarketIndex();
    indexTimer.current = setInterval(loadMarketIndex, 300000);
    return () => clearInterval(indexTimer.current);
  }, []);

  // 리스트 화면일 때 현재가 조회 + 60초마다 자동 갱신
  useEffect(() => {
    if (screen !== 'list' || !watchlist.length) return;
    loadCurrentPrices(watchlist);
    refreshTimer.current = setInterval(() => loadCurrentPrices(watchlist), 60000);
    return () => clearInterval(refreshTimer.current);
  }, [screen, watchlist]);

  // 검색 화면 진입 시 초기화 + 포커스
  useEffect(() => {
    if (screen === 'search') {
      setQuery(''); setSearchResults([]);
      setTimeout(() => searchRef.current?.focus(), 80);
    }
  }, [screen]);

  // 검색 디바운스 (300ms)
  useEffect(() => {
    const q = query.trim();
    if (!q) { setSearchResults([]); return; }
    const timer = setTimeout(async () => {
      setSearchLoading(true);
      try {
        const watched = new Set(watchlist.map(s => s.c));
        const data = await apiSearch(q);
        setSearchResults(data.map(s => ({ ...s, added: watched.has(s.c) })));
      } catch {}
      setSearchLoading(false);
    }, 300);
    return () => clearTimeout(timer);
  }, [query, watchlist]);

  // 관심종목 저장
  const save        = list => { setWatchlist(list); ls.set(STORAGE_KEY, list); };
  const addStock    = s    => { if (!watchlist.some(w => w.c === s.c)) save([...watchlist, { c:s.c, n:s.n, m:s.m }]); };
  const removeStock = code => {
    save(watchlist.filter(s => s.c !== code));
    if (selected?.c === code) { setSelected(null); setScreen('list'); }
  };

  // 종가 조회
  const loadPrices = useCallback(async (stock, p, force = false) => {
    setPriceLoading(true); setPriceData(null); setPriceError(''); setPriceSource(''); setFetchedAt(null);
    if (!force) {
      const cached = ls.get(`price:${stock.c}:${p}`);
      if (cached && Date.now() - cached.ts < 30 * 60 * 1000) {
        setPriceData(cached.prices); setPriceSource(cached.source || '');
        setFetchedAt(cached.ts); setPriceLoading(false);
        return;
      }
    }
    try {
      const data = await apiPrices(stock.c, p);
      const now = Date.now();
      setPriceData(data.prices); setPriceSource(data.source || ''); setFetchedAt(now);
      ls.set(`price:${stock.c}:${p}`, { prices: data.prices, source: data.source, ts: now });
    } catch (err) {
      setPriceError(err.message);
    } finally {
      setPriceLoading(false);
    }
  }, []);

  const loadNews = useCallback(async (stock) => {
    setNewsLoading(true); setNews([]);
    try {
      const res = await fetch(`/api/news/${stock.c}?name=${encodeURIComponent(stock.n)}`);
      if (res.ok) setNews(await res.json());
    } catch {}
    setNewsLoading(false);
  }, []);

  const loadFundamentals = useCallback(async (stock) => {
    setFundamentals(null);
    try {
      const res = await fetch(`/api/financials/${stock.c}`);
      if (res.ok) setFundamentals(await res.json());
    } catch {}
  }, []);

  const loadInvestor = useCallback(async (stock) => {
    setInvestor(null);
    try {
      const res = await fetch(`/api/investor/${stock.c}`);
      if (res.ok) {
        const d = await res.json();
        if (d && d['개인']) setInvestor(d);
      }
    } catch {}
  }, []);

  const openAlertModal = stock => {
    const saved = (ls.get(ALERTS_KEY) || {})[stock.c] || {};
    setAlertDraft({
      target:   saved.target   ? String(saved.target)   : '',
      stopLoss: saved.stopLoss ? String(saved.stopLoss) : '',
      bigMove:  saved.bigMove  ?? false,
    });
    setPushStatus('idle');
    setAlertModal({ open: true, stock });
  };

  const saveAlert = () => {
    const code = alertModal.stock?.c;
    if (!code) return;
    const rule = {
      target:   alertDraft.target   ? parseInt(String(alertDraft.target).replace(/,/g, ''))   : null,
      stopLoss: alertDraft.stopLoss ? parseInt(String(alertDraft.stopLoss).replace(/,/g, '')) : null,
      bigMove:  alertDraft.bigMove,
    };
    const next = { ...(ls.get(ALERTS_KEY) || {}), [code]: rule };
    ls.set(ALERTS_KEY, next);
    setAlerts(next);
    registerPush(next);
  };

  const clearAlert = () => {
    const code = alertModal.stock?.c;
    if (!code) return;
    const next = { ...(ls.get(ALERTS_KEY) || {}) };
    delete next[code];
    ls.set(ALERTS_KEY, next);
    setAlerts(next);
    setAlertDraft({ target: '', stopLoss: '', bigMove: false });
  };

  const openDetail = stock => {
    setSelected(stock); setPriceData(null); setPriceError('');
    setNews([]); setFundamentals(null); setInvestor(null); setPeriod('1M'); setScreen('detail');
    loadPrices(stock, '1M'); loadNews(stock); loadFundamentals(stock); loadInvestor(stock);
  };

  const changePeriod = p => { setPeriod(p); loadPrices(selected, p); };

  const latest    = priceData?.[0];
  const chartData = priceData ? [...priceData].reverse() : [];
  const BASE = { fontFamily: 'system-ui, -apple-system, sans-serif' };

  // ── 검색 화면 ──────────────────────────────────────────────────
  if (screen === 'search') return (
    <div className="min-h-screen bg-white flex flex-col" style={BASE}>
      <header className="sticky top-0 z-10 bg-white border-b-2 border-stone-900 flex items-center gap-2 px-3 py-3">
        <button onClick={() => setScreen('list')} className="p-2 rounded active:bg-stone-100"><X size={22}/></button>
        <Search size={18} className="text-stone-400 shrink-0"/>
        <input ref={searchRef} type="text" value={query}
               onChange={e => setQuery(e.target.value)}
               placeholder="종목명 또는 종목코드 검색"
               className="flex-1 outline-none text-base py-1"/>
        {query
          ? <button onClick={() => setQuery('')} className="p-1"><X size={16} className="text-stone-400"/></button>
          : searchLoading && <Loader2 size={16} className="animate-spin text-stone-400 shrink-0"/>
        }
      </header>

      <div className="flex-1 overflow-y-auto">
        {!query.trim() && (
          <div className="p-10 text-center text-stone-400 text-sm leading-relaxed">
            종목명 또는 코드를 입력하세요<br/>
            <span className="text-xs text-stone-300">KOSPI · KOSDAQ 전종목 검색</span>
          </div>
        )}
        {query.trim() && !searchLoading && searchResults.length === 0 && (
          <div className="p-10 text-center text-stone-400 text-sm">
            '<b>{query}</b>' 검색 결과 없음
          </div>
        )}
        {searchLoading && searchResults.length === 0 && (
          <div className="p-10 text-center text-stone-400 text-sm flex flex-col items-center gap-2">
            <Loader2 size={24} className="animate-spin"/>
            검색 중...
          </div>
        )}
        {searchResults.length > 0 && (
          <>
            <div className="px-4 py-2 mono text-[11px] text-stone-400 border-b border-stone-100">
              {searchResults.length}개 결과
            </div>
            <ul>
              {searchResults.map(s => (
                <li key={s.c} className="border-b border-stone-100">
                  <div className="flex items-center px-4 py-4 gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="font-bold">{s.n}</div>
                      <div className="mono text-xs text-stone-500 mt-0.5">{s.c} · {s.m}</div>
                    </div>
                    {s.added
                      ? <span className="mono text-xs text-stone-400 border border-stone-200 px-3 py-1.5 shrink-0">등록됨</span>
                      : <button onClick={() => addStock(s)}
                                className="flex items-center gap-1 text-xs font-bold bg-stone-900 text-white px-3 py-1.5 active:bg-stone-700 shrink-0">
                          <Plus size={13}/> 추가
                        </button>
                    }
                  </div>
                </li>
              ))}
            </ul>
          </>
        )}
      </div>
    </div>
  );

  // ── 상세 화면 ──────────────────────────────────────────────────
  if (screen === 'detail' && selected) return (
    <div className="min-h-screen bg-white" style={BASE}>
      <header className="sticky top-0 z-10 bg-white border-b-2 border-stone-900">
        <div className="px-3 py-3 flex items-center gap-2">
          <button onClick={() => setScreen('list')} className="p-2 rounded active:bg-stone-100"><ArrowLeft size={22}/></button>
          <div className="flex-1 min-w-0">
            <div className="font-bold text-base truncate">{selected.n}</div>
            <div className="mono text-xs text-stone-500">{selected.c} · {selected.m}</div>
          </div>
          <button onClick={() => openAlertModal(selected)}
                  className={`p-2 rounded active:bg-stone-100 ${alerts[selected.c]?.target || alerts[selected.c]?.stopLoss || alerts[selected.c]?.bigMove ? 'text-stone-900' : 'text-stone-300'}`}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill={alerts[selected.c]?.target || alerts[selected.c]?.stopLoss || alerts[selected.c]?.bigMove ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <button onClick={() => loadPrices(selected, period, true)} disabled={priceLoading}
                  className="p-2 rounded active:bg-stone-100 disabled:opacity-40">
            <RefreshCw size={20} className={priceLoading ? 'animate-spin' : ''}/>
          </button>
        </div>
      </header>

      <div className="p-4 space-y-4">
        {/* 기간 선택 */}
        <div className="flex gap-1">
          {PERIODS.map(({ key, label }) => (
            <button key={key} onClick={() => changePeriod(key)} disabled={priceLoading}
                    className={`flex-1 py-2 text-xs font-bold border-2 transition-colors disabled:opacity-50 ${
                      period === key
                        ? 'bg-stone-900 text-white border-stone-900'
                        : 'bg-white text-stone-500 border-stone-200 active:border-stone-900'
                    }`}>
              {label}
            </button>
          ))}
        </div>

        {priceLoading && (
          <div className="border-2 border-stone-200 p-12 text-center">
            <Loader2 className="animate-spin mx-auto text-stone-400 mb-3" size={32}/>
            <div className="text-sm font-bold text-stone-500">시세 조회 중...</div>
            <div className="text-xs text-stone-400 mt-1">KRX에서 데이터를 가져오는 중</div>
          </div>
        )}

        {priceError && !priceLoading && (
          <div className="bg-red-50 border-2 border-red-500 p-4">
            <div className="flex items-center gap-2 text-red-700 font-bold text-sm mb-1">
              <AlertCircle size={16}/> 조회 실패
            </div>
            <div className="text-xs text-red-600 leading-relaxed break-all">{priceError}</div>
            <button onClick={() => loadPrices(selected, period, true)}
                    className="mt-3 text-xs font-bold bg-red-600 text-white px-3 py-2 active:bg-red-700">
              다시 시도
            </button>
          </div>
        )}

        {/* 재무 핵심 지표 */}
        {(fundamentals || !priceLoading) && (
          <div className="grid grid-cols-4 gap-2">
            {[
              { label: 'PER', value: fundamentals?.per != null ? fundamentals.per.toFixed(2) + 'x' : '-' },
              { label: 'PBR', value: fundamentals?.pbr != null ? fundamentals.pbr.toFixed(2) + 'x' : '-' },
              { label: '시가총액', value: (() => { const m = fundamentals?.marcap; if (m == null) return '-'; return m >= 10000 ? (m/10000).toFixed(1) + '조' : fp(m) + '억'; })() },
              { label: '배당률', value: fundamentals?.div != null ? fundamentals.div.toFixed(2) + '%' : '-' },
            ].map(({ label, value }) => (
              <div key={label} className="border-2 border-stone-200 bg-white p-3 text-center">
                <div className="text-[10px] tracking-widest text-stone-400 mb-1">{label}</div>
                <div className="mono text-sm font-bold text-stone-800">{value}</div>
              </div>
            ))}
          </div>
        )}

        {/* 52주 고저 위치 바 + 거래량/거래대금 */}
        {fundamentals?.high52 && fundamentals?.low52 && !priceLoading && (() => {
          const cur = currentPrices[selected?.c]?.close || (priceData?.[0]?.close);
          const pct = cur ? Math.round((cur - fundamentals.low52) / (fundamentals.high52 - fundamentals.low52) * 100) : null;
          return (
            <div className="grid grid-cols-2 gap-2">
              <div className="border-2 border-stone-200 bg-white p-3">
                <div className="text-[10px] tracking-widest text-stone-400 mb-2">52주 범위</div>
                <div className="relative h-2 bg-stone-100 rounded-full mb-2">
                  <div className="absolute top-0 left-0 h-2 bg-stone-300 rounded-full" style={{ width: `${pct ?? 50}%` }}/>
                  {pct != null && <div className="absolute top-[-3px] w-2 h-4 bg-stone-900 rounded-sm" style={{ left: `calc(${pct}% - 4px)` }}/>}
                </div>
                <div className="flex justify-between mono text-[10px] text-stone-400">
                  <span>저 {fp(fundamentals.low52)}</span>
                  <span>고 {fp(fundamentals.high52)}</span>
                </div>
              </div>
              <div className="border-2 border-stone-200 bg-white p-3">
                <div className="text-[10px] tracking-widest text-stone-400 mb-2">당일 거래</div>
                <div className="flex flex-col gap-1.5">
                  <div className="flex justify-between items-baseline">
                    <span className="text-[10px] text-stone-400">거래량</span>
                    <span className="mono text-sm font-bold text-stone-800">{fundamentals.vol ? fp(fundamentals.vol)+'주' : '-'}</span>
                  </div>
                  <div className="flex justify-between items-baseline">
                    <span className="text-[10px] text-stone-400">거래대금</span>
                    <span className="mono text-sm font-bold text-stone-800">{fundamentals.tr_pbmn ? fp(fundamentals.tr_pbmn)+'원' : '-'}</span>
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        {/* 수급 정보 */}
        {investor && (() => {
          const rows = [
            { label: '개인',   data: investor['개인']   },
            { label: '기관',   data: investor['기관']   },
            { label: '외국인', data: investor['외국인'] },
          ];
          const maxAbs = Math.max(...rows.map(r => Math.abs(r.data?.net ?? 0)), 1);
          return (
            <div className="border-2 border-stone-200 bg-white">
              <div className="border-b border-stone-100 px-3 py-2 flex justify-between items-center">
                <div className="text-[10px] tracking-widest text-stone-400">수급 (당일)</div>
                {investor.date && <div className="mono text-[10px] text-stone-300">{investor.date.slice(0,4)+'.'+investor.date.slice(4,6)+'.'+investor.date.slice(6)}</div>}
              </div>
              {rows.map(({ label, data }) => {
                const net = data?.net ?? 0;
                const pct = Math.abs(net) / maxAbs * 100;
                const buy = net >= 0;
                const holdingRatio = label === '외국인' ? fundamentals?.foreign_ratio : null;
                return (
                  <div key={label} className="px-3 py-2 flex items-center gap-2 border-b border-stone-50 last:border-0">
                    <div className="text-xs text-stone-500 w-10 shrink-0">{label}</div>
                    <div className="flex-1 relative h-2 bg-stone-100 rounded-full overflow-hidden">
                      <div className="absolute top-0 h-2 rounded-full"
                           style={{ width: `${pct}%`, left: buy ? 0 : 'auto', right: buy ? 'auto' : 0,
                                    background: buy ? '#ef4444' : '#3b82f6' }}/>
                    </div>
                    <div className={`mono text-xs font-bold w-20 text-right shrink-0 ${buy ? 'text-red-500' : 'text-blue-500'}`}>
                      {net >= 0 ? '+' : ''}{net != null ? (Math.abs(net) >= 10000 ? (net/10000).toFixed(2)+'조' : net.toFixed(0)+'억') : '-'}
                    </div>
                    <div className="mono text-xs text-stone-400 w-14 text-right shrink-0">
                      {holdingRatio != null ? holdingRatio.toFixed(2)+'%' : '─'}
                    </div>
                  </div>
                );
              })}
              <div className="px-3 py-1.5 flex justify-end">
                <span className="text-[10px] text-stone-300 tracking-wide">보유율 (기관·개인 일별 미공개)</span>
              </div>
            </div>
          );
        })()}

        {latest && !priceLoading && (
          <>
            <div className="bg-stone-900 text-white p-5">
              <div className="text-xs text-stone-400 tracking-widest mb-2">LATEST CLOSE</div>
              <div className="mono text-4xl font-black mb-2">₩{fp(latest.close)}</div>
              <div className={`mono text-sm font-bold flex items-center gap-1 ${cc(latest.change)}`}>
                {latest.change > 0 ? <TrendingUp size={14}/> : latest.change < 0 ? <TrendingDown size={14}/> : null}
                {fChange(latest.change, latest.changePct)}
              </div>
              <div className="mono text-xs text-stone-500 mt-3">{latest.date}</div>
            </div>

            {chartData.length > 1 && (
              <div className="border-2 border-stone-900 p-4">
                <div className="text-xs font-bold tracking-widest text-stone-500 mb-3">
                  종가 추이 · {chartData.length}일
                </div>
                <PriceChart data={chartData}/>
              </div>
            )}

            <div className="border-2 border-stone-900">
              <div className="border-b-2 border-stone-900 px-4 py-3 flex justify-between items-center">
                <div className="text-xs font-bold tracking-widest">일별 종가</div>
                <div className="mono text-xs text-stone-400">최신순</div>
              </div>
              <ul>
                {priceData.map((row, i) => (
                  <li key={i} className={`px-4 py-3 flex items-center justify-between ${i !== priceData.length-1 ? 'border-b border-stone-100' : ''}`}>
                    <div className="mono text-sm text-stone-500">{row.date}</div>
                    <div className="text-right">
                      <div className="mono text-base font-bold">₩{fp(row.close)}</div>
                      <div className={`mono text-xs font-bold ${cc(row.change)}`}>{fChange(row.change, row.changePct)}</div>
                    </div>
                  </li>
                ))}
              </ul>
            </div>

            {(priceSource || fetchedAt) && (
              <div className="text-center mono text-xs text-stone-400 leading-relaxed">
                {priceSource && <div>출처: {priceSource}</div>}
                {fetchedAt && <div>조회: {new Date(fetchedAt).toLocaleTimeString('ko-KR')} · 30분 캐시</div>}
              </div>
            )}

            {/* 관련 뉴스 */}
            <div className="border-2 border-stone-900">
              <div className="border-b-2 border-stone-900 px-4 py-3 flex justify-between items-center">
                <div className="text-xs font-bold tracking-widest">관련 뉴스</div>
                {newsLoading && <Loader2 size={14} className="animate-spin text-stone-400"/>}
              </div>
              {!newsLoading && news.length === 0 && (
                <div className="px-4 py-6 text-center text-xs text-stone-400">뉴스를 불러올 수 없습니다</div>
              )}
              <ul>
                {news.map((n, i) => (
                  <li key={i} className={i !== news.length - 1 ? 'border-b border-stone-100' : ''}>
                    <a href={n.link} target="_blank" rel="noopener noreferrer"
                       className="block px-4 py-3 active:bg-stone-50">
                      <div className="text-sm font-medium leading-snug text-stone-800 line-clamp-2">{n.title}</div>
                      <div className="mono text-xs text-stone-400 mt-1">{n.source} · {n.date}</div>
                    </a>
                  </li>
                ))}
              </ul>
            </div>
          </>
        )}
      </div>
      {alertModal.open && <AlertModal stock={alertModal.stock} draft={alertDraft} setDraft={setAlertDraft} onSave={saveAlert} onClear={clearAlert} onClose={() => setAlertModal({ open:false, stock:null })} pushStatus={pushStatus}/>}
    </div>
  );

  // ── 리스트 화면 ────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-stone-50" style={BASE}>
      <header className="sticky top-0 z-10 bg-white border-b-2 border-stone-900">
        <div className="px-4 py-4 flex items-center justify-between">
          <div>
            <div className="text-[10px] tracking-[0.25em] text-stone-400 mb-0.5">KOREA STOCK</div>
            <h1 className="text-xl font-black">관심종목</h1>
          </div>
          <button onClick={() => setScreen('search')}
                  className="flex items-center gap-1.5 text-xs font-bold bg-stone-900 text-white px-4 py-2.5 active:bg-stone-700">
            <Search size={14}/> 종목 추가
          </button>
        </div>
        {/* 시장 지수 바 */}
        <div className="border-t border-stone-100 px-4 py-2 flex gap-4">
          {[
            { key: 'kospi', label: 'KOSPI' },
            { key: 'kosdaq', label: 'KOSDAQ' },
          ].map(({ key, label }) => {
            const idx = marketIndex?.[key];
            return (
              <div key={key} className="flex items-center gap-2">
                <span className="text-[10px] tracking-widest text-stone-400 font-bold">{label}</span>
                {idx
                  ? <>
                      <span className={`mono text-sm font-bold ${cc(idx.change)}`}>
                        {new Intl.NumberFormat('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(idx.value)}
                      </span>
                      <span className={`mono text-xs ${cc(idx.change)}`}>
                        {idx.change > 0 ? '+' : ''}{idx.changePct.toFixed(2)}%
                      </span>
                    </>
                  : <span className="mono text-sm text-stone-300">-</span>
                }
              </div>
            );
          })}
        </div>
      </header>

      <main className="p-4">
        {!ready
          ? <div className="pt-16 text-center"><Loader2 className="animate-spin mx-auto text-stone-300" size={24}/></div>
          : watchlist.length === 0
            ? (
              <div className="mt-8 border-2 border-dashed border-stone-300 bg-white p-12 text-center">
                <Search className="mx-auto text-stone-300 mb-3" size={36}/>
                <p className="text-stone-500 text-sm leading-loose">
                  관심종목이 없습니다.<br/>
                  <span className="font-bold">종목 추가</span> 버튼으로 검색해서 추가하세요.
                </p>
              </div>
            )
            : (
              <>
                <div className="mono text-[11px] text-stone-400 mb-3">{watchlist.length}개 종목 등록됨</div>
                <ul className="space-y-2">
                  {watchlist.map(s => {
                    const cp = currentPrices[s.c];
                    return (
                      <li key={s.c}>
                        <div className="flex items-stretch bg-white border-2 border-stone-200 active:border-stone-900 transition-colors">
                          <button className="flex-1 text-left px-4 py-4 min-w-0" onClick={() => openDetail(s)}>
                            <div className="flex items-center justify-between gap-2">
                              <div className="font-bold text-base truncate">{s.n}</div>
                              {cp?.loading
                                ? <Loader2 size={14} className="animate-spin text-stone-300 shrink-0"/>
                                : cp?.close
                                  ? <div className="text-right shrink-0">
                                      <div className={`mono font-black text-base ${cc(cp.change)}`}>
                                        ₩{fp(cp.close)}
                                      </div>
                                      <div className={`mono text-xs ${cc(cp.change)}`}>
                                        {cp.change > 0 ? '+' : ''}{fp(cp.change)} ({cp.change > 0 ? '+' : ''}{Number(cp.changePct).toFixed(2)}%)
                                      </div>
                                    </div>
                                  : null
                              }
                            </div>
                            <div className="mono text-xs text-stone-500 mt-0.5">{s.c} · {s.m}</div>
                          </button>
                          <button onClick={() => openAlertModal(s)}
                                  className={`px-3 border-l border-stone-100 ${alerts[s.c]?.target || alerts[s.c]?.stopLoss || alerts[s.c]?.bigMove ? 'text-stone-700' : 'text-stone-300'} active:bg-stone-50`}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill={alerts[s.c]?.target || alerts[s.c]?.stopLoss || alerts[s.c]?.bigMove ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                          </button>
                          <button onClick={() => removeStock(s.c)}
                                  className="px-4 border-l border-stone-100 text-stone-300 active:text-red-600 active:bg-red-50">
                            <Trash2 size={16}/>
                          </button>
                        </div>
                      </li>
                    );
                  })}
                </ul>
                <div className="mono text-[10px] text-stone-400 text-center mt-6">60초마다 자동 갱신 · 탭하면 차트 조회</div>
              </>
            )
        }
      </main>
      {alertModal.open && <AlertModal stock={alertModal.stock} draft={alertDraft} setDraft={setAlertDraft} onSave={saveAlert} onClear={clearAlert} onClose={() => setAlertModal({ open:false, stock:null })} pushStatus={pushStatus}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StockTracker/>);
</script>
</body>
</html>
